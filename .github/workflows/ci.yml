name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Scan the full git history directly. The gitleaks action's push mode
      # diffs firstCommit^..head, which fails on the initial push because the
      # root commit has no parent; `detect` scans every commit on every run.
      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan full history for secrets
        run: gitleaks detect --source . --redact --exit-code 1

  checks:
    name: Typecheck · lint · test · RLS · migrations · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run check:rls
      - run: npm run check:migrations
      - run: npm run build
